
name: Build Singularity CarTool Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build Framework
      run: |
        chmod +x build_static_cartool.sh
        ./build_static_cartool.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CarTool-Singularity-Framework
        path: build/CarTool.framework
