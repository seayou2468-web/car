name: Build Singularity CarTool Static Library

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build Static Library
      run: |
        chmod +x build_static_cartool.sh
        ./build_static_cartool.sh

    - name: Upload Static Library
      uses: actions/upload-artifact@v4
      with:
        name: CarTool-Static-Library
        path: build/libCarTool.a

    - name: Upload Headers
      uses: actions/upload-artifact@v4
      with:
        name: CarTool-Headers
        path: build/include/
